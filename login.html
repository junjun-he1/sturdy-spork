<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Python 训练项目中心</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="/" class="nav-brand">Python 训练项目中心</a>
      <ul class="nav-links">
        <li><a href="/">首页</a></li>
        <li><a href="/projects/">项目</a></li>
        <li><a href="/exercises/">练习题</a></li>
        <li><a href="/about.html">关于</a></li>
        <li><a href="/login.html" class="active">登录</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="auth-page">
      <div class="auth-card">
        <h1>欢迎使用</h1>
        <p class="subtitle">Python 训练项目中心</p>

        <div class="auth-tabs">
          <div class="auth-tab active" data-tab="login">登录</div>
          <div class="auth-tab" data-tab="register">注册</div>
        </div>

        <!-- 登录表单 -->
        <form class="auth-form active" id="loginForm">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="loginUsername" placeholder="请输入用户名" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码" required>
          </div>
          <button type="submit" class="btn-auth">登录</button>
          <div class="auth-msg" id="loginMsg"></div>
          <div class="auth-footer">
            还没有账号？<a href="javascript:void(0)" onclick="switchTab('register')">立即注册</a>
          </div>
        </form>

        <!-- 注册表单 -->
        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="regUsername" placeholder="请输入用户名" required>
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="regEmail" placeholder="请输入邮箱" required>
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="regPassword" placeholder="请输入密码（至少6位）" required>
          </div>
          <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" required>
          </div>
          <button type="submit" class="btn-auth">注册</button>
          <div class="auth-msg" id="registerMsg"></div>
          <div class="auth-footer">
            已有账号？<a href="javascript:void(0)" onclick="switchTab('login')">去登录</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <p>Python 训练项目中心 · Copyright &copy; 2026</p>
  </footer>

  <script>
    // ===== Tab 切换 =====
    function switchTab(tabName) {
      document.querySelectorAll('.auth-tab').forEach(function(tab) {
        tab.classList.remove('active');
        if (tab.getAttribute('data-tab') === tabName) {
          tab.classList.add('active');
        }
      });
      document.querySelectorAll('.auth-form').forEach(function(form) {
        form.classList.remove('active');
      });
      document.getElementById(tabName === 'login' ? 'loginForm' : 'registerForm').classList.add('active');
      // 清除提示信息
      document.getElementById('loginMsg').className = 'auth-msg';
      document.getElementById('loginMsg').textContent = '';
      document.getElementById('registerMsg').className = 'auth-msg';
      document.getElementById('registerMsg').textContent = '';
    }

    document.querySelectorAll('.auth-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        switchTab(this.getAttribute('data-tab'));
      });
    });

    // ===== 辅助函数：获取用户列表 =====
    function getUsers() {
      var users = localStorage.getItem('python_center_users');
      return users ? JSON.parse(users) : [];
    }

    function saveUsers(users) {
      localStorage.setItem('python_center_users', JSON.stringify(users));
    }

    function showMsg(id, type, text) {
      var el = document.getElementById(id);
      el.textContent = text;
      el.className = 'auth-msg ' + type;
    }

    // ===== 注册逻辑 =====
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var username = document.getElementById('regUsername').value.trim();
      var email = document.getElementById('regEmail').value.trim();
      var password = document.getElementById('regPassword').value;
      var confirmPassword = document.getElementById('regConfirmPassword').value;

      // 验证密码长度
      if (password.length < 6) {
        showMsg('registerMsg', 'error', '密码长度不能少于6位');
        return;
      }

      // 验证两次密码一致
      if (password !== confirmPassword) {
        showMsg('registerMsg', 'error', '两次输入的密码不一致');
        return;
      }

      // 验证用户名不重复
      var users = getUsers();
      var exists = users.some(function(u) { return u.username === username; });
      if (exists) {
        showMsg('registerMsg', 'error', '用户名已存在，请换一个');
        return;
      }

      // 保存用户
      users.push({
        username: username,
        email: email,
        password: password,
        joinDate: new Date().toISOString()
      });
      saveUsers(users);

      showMsg('registerMsg', 'success', '注册成功！请登录');

      // 清空表单
      this.reset();

      // 自动切换到登录 tab
      setTimeout(function() {
        switchTab('login');
      }, 1000);
    });

    // ===== 登录逻辑 =====
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var username = document.getElementById('loginUsername').value.trim();
      var password = document.getElementById('loginPassword').value;

      var users = getUsers();
      var user = users.find(function(u) {
        return u.username === username && u.password === password;
      });

      if (!user) {
        showMsg('loginMsg', 'error', '用户名或密码错误');
        return;
      }

      // 存储登录状态
      localStorage.setItem('python_center_logged_in', username);

      // 跳转到用户中心
      window.location.href = '/profile.html';
    });

    // 如果已登录，直接跳转
    if (localStorage.getItem('python_center_logged_in')) {
      window.location.href = '/profile.html';
    }
  </script>
</body>
</html>
